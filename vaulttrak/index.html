<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policies - Jose Caraballo Apps</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #333;
            background: #f5f5f7;
        }
        h1 {
            color: #1d1d1f;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #86868b;
            margin-bottom: 50px;
        }
        .app-list {
            display: grid;
            gap: 20px;
        }
        .app-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .app-name {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 10px;
        }
        .app-description {
            color: #86868b;
            margin-bottom: 15px;
        }
        .view-policy {
            color: #0071e3;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            color: #86868b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Privacy Policies</h1>
    <p class="subtitle">Jose Caraballo Apps</p>

    <div class="app-list">
        <a href="/vaulttrak/" class="app-card">
            <div class="app-name">🔒 VaultTrak</div>
            <div class="app-description">Career and finance tracking for professionals</div>
            <div class="view-policy">View Privacy Policy →</div>
        </a>

        <!-- Add future apps here -->
        <!--
        <a href="/your-next-app/" class="app-card">
            <div class="app-name">📱 Your Next App</div>
            <div class="app-description">App description</div>
            <div class="view-policy">View Privacy Policy →</div>
        </a>
        -->
    </div>

    <div class="footer">
        <p>© 2025 Jose Caraballo. All rights reserved.</p>
    </div>
</body>
</html>
